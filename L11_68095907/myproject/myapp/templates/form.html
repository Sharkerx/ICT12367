{% extends 'base.html' %}

{% block title %}แบบฟอร์มบันทึกข้อมูลประชากร{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h3 class="mb-0">แบบฟอร์มบันทึกข้อมูลประชากร</h3>
                </div>
                
                <div class="card-body p-4 bg-light">
                    <form method="post" action="/form/">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">ชื่อประชากร</label>
                            <input type="text" class="form-control" name="name" id="name" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="age" class="form-label fw-bold">อายุ</label>
                            <input type="number" class="form-control" name="age" id="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" min="0" required>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success flex-grow-1">ลงทะเบียน</button>
                            <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                            <a href="/" class="btn btn-secondary">กลับหน้าแรก</a>
                        </div>
                        
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
