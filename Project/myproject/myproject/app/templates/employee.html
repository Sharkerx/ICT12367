{% extends 'base.html' %}
{% block content %}

<div class="page-header">
    <h2>Employees</h2>
    <p>รายชื่อพนักงานและไกด์ในระบบ</p>
</div>

<div class="card" style="padding:0; overflow:hidden;">
    <table class="table mb-0">
        <thead>
            <tr>
                <th>ID</th>
                <th>ชื่อพนักงาน</th>
                <th>ตำแหน่ง</th>
                <th>Username</th>
            </tr>
        </thead>
        <tbody>
        {% for e in data %}
        <tr>
            <td style="font-weight:700; color:#c9a84c; font-family:'Playfair Display',serif;">{{ e.emp_id }}</td>
            <td>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:34px;height:34px;background:linear-gradient(135deg,#0a1628,#1a3a6e);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;flex-shrink:0;">
                        {{ e.emp_name|first }}
                    </div>
                    <span style="font-weight:600; color:#0a1628;">{{ e.emp_name }}</span>
                </div>
            </td>
            <td>
                <span style="background:#fffbeb; color:#d97706; font-size:11.5px; font-weight:600; padding:4px 12px; border-radius:20px;">{{ e.role }}</span>
            </td>
            <td style="color:#8892a4; font-size:13px; font-family:monospace;">{{ e.username }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" style="text-align:center; padding:48px; color:#8892a4;">
                <div style="font-size:32px; margin-bottom:10px;">👔</div>
                ยังไม่มีข้อมูลพนักงาน
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
