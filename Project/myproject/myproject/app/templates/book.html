{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 text-white">

    <h2>✈️ Booking Tour</h2>

    <div class="card p-4 bg-dark mt-3">

        <h4>{{ tour.name }}</h4>
        <p>💰 ราคา: {{ tour.price }} บาท</p>

        <form method="POST">
            {% csrf_token %}

            <!-- 🔥 ลูกค้า -->
            <div class="mb-3">
                <label>👤 เลือกลูกค้า</label>
                <select name="cus_id" class="form-control" required>
                    <option value="">-- เลือก --</option>
                    {% for c in customers %}
                        <option value="{{ c.0 }}">
                            {{ c.0 }} - {{ c.1 }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- 🔥 schedule -->
            <div class="mb-3">
                <label>📅 เลือกรอบเดินทาง</label>
                <select name="schedule_id" class="form-control" required>
                    <option value="">-- เลือก --</option>
                    {% for s in schedules %}
                        <option value="{{ s.0 }}">
                            รอบที่ {{ s.0 }} ({{ s.1 }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button class="btn btn-success w-100">
                ✅ Confirm Booking
            </button>

        </form>

    </div>

</div>

{% endblock %}
